<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regressiva</title>
</head>
<body>
    <h1>Contagem Regressiva</h1>

    <label for="numero">Informe um número para a contagem regressiva: </label>
    <input id="numero" type="number" placeholder="Digite um número">

    <button onclick="contagem()">Contagem regressiva</button>

    <h2 id="contagem">Contagem... </h2>

    <script>

        function contagem(){

            let numero = Number(document.getElementById("numero").value);
        
            for (let i = numero; i >= 0; i--) {

                document.getElementById("contagem").innerHTML += i + "  ";
            }
        }

    </script>
</body>
</html>
