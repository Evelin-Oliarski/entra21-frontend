<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto</title>
</head>
<body>
    <h1>Calculadora de Desconto</h1>

    <label for="preco">Preço do produto:</label>
    <input id="preco" type="number" placeholder="Digite o valor do produto">

    <label for="porcentagem">Porcentagem de desconto:</label>
    <input id="porcentagem" type="number" placeholder="Digite o desconto" >

    <button onclick="calcular()">Calcular</button>

    <h2 id="calcular">Novo valor:</h2>

    <script>

        function calcular(){
            let preco = document.getElementById("preco").value;
            let desconto = document.getElementById("porcentagem").value;

            let novoValor = preco - (preco*(desconto/100));

            document.getElementById("calcular").innerHTML = 'Novo valor: R$' + novoValor;
        }

    </script>
</body>
</html>
