<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Caracteres com Limite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>

        <!--É um campo de texto multilinha — diferente do <input>, que é de uma linha só. 
        Muito usado em formulários de comentários, descrições, mensagens etc.
        O atributo maxlength="50" já bloqueia o usuário de digitar mais que 50 caracteres.-->

        <textarea id="mensagem" maxlength="50" placeholder="Digite sua mensagem..."></textarea>
        <p id="contador">Caracteres restantes: 50</p>
    </form>
    <script src="script.js"></script>
</body>
</html>
