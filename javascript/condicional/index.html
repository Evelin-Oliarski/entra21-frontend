<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If</title>
</head>
<body>
    <script>
        let num = 20;
        let logico = true;

        if (num <= 18 && num > 0){
            console.log("Menor de idade!")
        } else{
            console.log("Maior de idade!")
        }

        if (num < 0) {
            logico = false;
            console.log(logico)
        } else {
            console.log(logico)
        }

        //Se for comparar igualdade, sempre usar 3 sinais de IGUAL: ===.
        //Só == compara se o valor é igual
        //Com === compara se o valor é igual e se é do mesmo tipo

    </script>
</body>
</html>
